name: PR

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  detect:
    name: Detect Changed Packages
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.changed.outputs.matrix }}
      any: ${{ steps.changed.outputs.any }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Find changed packages
        id: changed
        env:
          BASE: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
        run: |
          if [ -z "$BASE" ] || [ "$BASE" = "0000000000000000000000000000000000000000" ]; then
            PKGS=$(find models packages -maxdepth 1 -mindepth 1 -type d 2>/dev/null \
              | while IFS= read -r d; do [ -f "$d/Makefile" ] && echo "$d"; done)
          else
            PKGS=$(git diff --name-only "$BASE" HEAD \
              | grep -E '^(models|packages)/' \
              | awk -F/ '{print $1"/"$2}' \
              | sort -u \
              | while IFS= read -r d; do [ -f "$d/Makefile" ] && echo "$d"; done)
          fi
          MATRIX=$(echo "$PKGS" | grep -v '^$' | jq -R . | jq -sc .)
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"
          [ "$MATRIX" = "[]" ] && echo "any=false" >> "$GITHUB_OUTPUT" || echo "any=true" >> "$GITHUB_OUTPUT"

  ci:
    name: CI — ${{ matrix.package }}
    needs: detect
    if: needs.detect.outputs.any == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJson(needs.detect.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: make -C ${{ matrix.package }} dev

      - name: Check
        run: make -C ${{ matrix.package }} check

      - name: Test
        run: make -C ${{ matrix.package }} test
